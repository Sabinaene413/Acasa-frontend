<app-navbar />

<div class="min-h-screen bg-slate-50 py-12 px-4 sm:px-6 lg:px-8 mt-16 relative overflow-hidden">
  <!-- Subtle background element -->
  <div class="absolute top-0 left-1/2 -translate-x-1/2 w-full max-w-7xl h-[500px] bg-linear-to-b from-orange/5 to-transparent rounded-full blur-3xl -z-10"></div>

  <div class="max-w-5xl mx-auto space-y-10 animate-in fade-in slide-in-from-bottom-4 duration-700">

    <!-- Profile Header Card -->
    <div class="bg-white rounded-[2.5rem] shadow-xl shadow-slate-200/50 border border-slate-100 p-8 md:p-12 relative overflow-hidden">
      <!-- Decorative element -->
      <div class="absolute -top-12 -right-12 w-40 h-40 bg-orange/5 rounded-full"></div>

      <div class="flex flex-col md:flex-row items-center gap-10 relative z-10">
        <!-- User Avatar -->
        <div class="relative">
          <div class="w-28 h-28 bg-slate-50 rounded-3xl flex items-center justify-center border border-slate-100 shadow-inner group">
            <i class="pi pi-user text-4xl text-slate-200 group-hover:text-orange transition-colors"></i>
          </div>
          <div class="absolute -bottom-2 -right-2 w-8 h-8 bg-orange text-white rounded-xl flex items-center justify-center border-4 border-white shadow-lg">
            <i class="pi pi-check text-[10px]"></i>
          </div>
        </div>

        <div class="flex-grow text-center md:text-left space-y-4">
          <div class="space-y-1">
            <span class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">Profilul Meu</span>
            <h1 class="text-3xl md:text-4xl font-black text-slate-900 tracking-tight">
              {{ authService.currentUser()?.name ?? 'Utilizator Acasă' }}
            </h1>
          </div>

          <div class="flex flex-wrap items-center justify-center md:justify-start gap-6">
            <div class="flex items-center gap-2.5 text-slate-500 font-bold text-sm">
              <div class="w-8 h-8 rounded-lg bg-orange/10 flex items-center justify-center text-orange">
                <i class="pi pi-envelope text-xs"></i>
              </div>
              {{ authService.currentUser()?.email ?? 'Indisponibil' }}
            </div>
            
            @if (authService.currentUser()?.phoneNumber) {
              <div class="flex items-center gap-2.5 text-slate-500 font-bold text-sm">
                <div class="w-8 h-8 rounded-lg bg-blue-500/10 flex items-center justify-center text-blue-600">
                  <i class="pi pi-phone text-xs"></i>
                </div>
                {{ authService.currentUser()?.phoneNumber }}
              </div>
            }
          </div>
        </div>

        <button (click)="logout()"
          class="px-8 h-14 bg-slate-900 text-white rounded-2xl font-black text-sm hover:bg-red-500 shadow-lg shadow-slate-900/10 hover:shadow-red-500/20 transition-all flex items-center gap-3 active:scale-[0.98]">
          <i class="pi pi-sign-out text-xs"></i>
          Delogare
        </button>
      </div>
    </div>

    <!-- My Properties Section -->
    <div class="space-y-6">
      <app-my-properties-list />
    </div>

  </div>
</div>
