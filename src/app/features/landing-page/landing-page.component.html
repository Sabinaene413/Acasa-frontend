<div class="min-h-screen flex flex-col bg-slate-50 font-sans pt-20">
  <app-navbar />

  <main class="flex-grow flex flex-col items-center px-4 py-12 md:py-20 relative overflow-hidden">
    <!-- Subtle Background Element -->
    <div class="absolute top-0 left-1/2 -translate-x-1/2 w-full max-w-7xl h-[500px] bg-linear-to-b from-orange/5 to-transparent rounded-full blur-3xl -z-10"></div>

    <div class="w-full flex flex-col items-center text-center space-y-12">
      <!-- Hero text -->
      <div class="space-y-6 max-w-4xl px-4">
        <h1 class="text-4xl md:text-6xl lg:text-7xl font-black text-slate-900 tracking-tight leading-[1.1]">
          Găsește-ți locul <span class="text-orange relative inline-block">
            perfect
            <svg class="absolute -bottom-2 left-0 w-full h-2 text-orange/30" viewBox="0 0 100 10" preserveAspectRatio="none">
              <path d="M0 5 Q 25 0, 50 5 T 100 5" fill="none" stroke="currentColor" stroke-width="4" />
            </svg>
          </span>
        </h1>
        <p class="text-lg md:text-xl text-slate-500 font-medium max-w-2xl mx-auto leading-relaxed">
          Descoperă cele mai bune oferte imobiliare, selectate cu grijă pentru confortul și viitorul tău.
        </p>
      </div>

      <!-- Search Form Section -->
      <div class="max-w-5xl w-full px-4 relative z-10">
        <app-property-search-form
          (search)="onSearch($event)"
          (saveSearch)="showSaveModal.set(true)"
        >
        </app-property-search-form>
        
        <app-saved-searches-bar (applySearch)="onSearch($event)">
        </app-saved-searches-bar>
      </div>

      <!-- Results Grid Section -->
      <div class="max-w-7xl w-full px-4 pb-20">
        <div class="flex items-center justify-between mb-8">
          <h2 class="text-2xl font-bold text-slate-800">Proprietăți Disponibile</h2>
          <div class="h-px flex-grow mx-6 bg-slate-200 hidden md:block"></div>
          <p class="text-sm font-medium text-slate-400">{{ totalCount() }} rezultate găsite</p>
        </div>

        <app-property-results-grid
          [properties]="properties()"
          [isLoading]="isLoading()"
        >
        </app-property-results-grid>

        <div class="mt-16 flex justify-center">
          <app-pagination
            [currentPage]="currentFilter().pageNumber || 1"
            [totalCount]="totalCount()"
            [pageSize]="currentFilter().pageSize || 12"
            (pageChange)="onPageChange($event)"
          >
          </app-pagination>
        </div>
      </div>
    </div>
  </main>

  <!-- Decorative Footer Line -->
  <div class="h-1.5 bg-linear-to-r from-orange to-orange-600 w-full"></div>
</div>

@if (showSaveModal()) {
  <app-save-search-modal
    [filter]="currentFilter()"
    (saved)="onSearchSaved($event)"
    (close)="showSaveModal.set(false)"
  >
  </app-save-search-modal>
}
