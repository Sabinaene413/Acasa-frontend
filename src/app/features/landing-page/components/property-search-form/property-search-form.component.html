<form
  (ngSubmit)="onSubmit()"
  class="bg-white p-6 md:p-8 rounded-[2rem] shadow-xl border border-slate-100 space-y-8 relative overflow-hidden"
>
  <!-- Decorative accent -->
  <div class="absolute top-0 left-0 w-2 h-full bg-orange"></div>

  <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
    <!-- Locație Section -->
    <div class="space-y-4">
      <div class="flex items-center gap-2 mb-2 px-1">
        <i class="pi pi-map-marker text-orange"></i>
        <span class="text-xs font-bold text-slate-800 uppercase tracking-widest">Unde cauți?</span>
      </div>

      <div class="space-y-3">
        <div class="relative">
          <p-select
            [(ngModel)]="filter.countyId"
            name="countyId"
            [options]="counties()"
            optionLabel="name"
            optionValue="id"
            placeholder="Alege Județul"
            [filter]="true"
            [showClear]="true"
            (onChange)="onCountyChange()"
            class="w-full h-12 !bg-slate-50 !rounded-xl !border-slate-100 !ring-0"
          >
          </p-select>
        </div>

        <div class="relative">
          <p-select
            [(ngModel)]="filter.cityId"
            name="cityId"
            [options]="cities()"
            optionLabel="name"
            optionValue="id"
            placeholder="Alege Orașul"
            [filter]="true"
            [showClear]="true"
            class="w-full h-12 !bg-slate-50 !rounded-xl !border-slate-100 !ring-0"
          >
          </p-select>
        </div>
      </div>
    </div>

    <!-- Compartimentare Section -->
    <div class="space-y-4">
      <div class="flex items-center gap-2 mb-2 px-1">
        <i class="pi pi-th-large text-orange"></i>
        <span class="text-xs font-bold text-slate-800 uppercase tracking-widest">Compartimentare</span>
      </div>

      <div class="space-y-3">
        <div class="flex items-center bg-slate-50 rounded-xl border border-slate-100 focus-within:border-orange/30 focus-within:bg-white focus-within:ring-4 focus-within:ring-orange/5 transition-all">
          <span class="pl-4 text-slate-400">
            <i class="pi pi-home text-sm"></i>
          </span>
          <input
            type="number"
            [(ngModel)]="filter.bedrooms"
            name="bedrooms"
            placeholder="Număr Dormitoare"
            class="w-full h-12 bg-transparent px-3 text-slate-800 border-none focus:ring-0 text-sm font-medium"
          />
        </div>

        <div class="flex items-center bg-slate-50 rounded-xl border border-slate-100 focus-within:border-orange/30 focus-within:bg-white focus-within:ring-4 focus-within:ring-orange/5 transition-all">
          <span class="pl-4 text-slate-400">
            <i class="pi pi-box text-sm"></i>
          </span>
          <input
            type="number"
            [(ngModel)]="filter.bathrooms"
            name="bathrooms"
            placeholder="Număr Băi"
            class="w-full h-12 bg-transparent px-3 text-slate-800 border-none focus:ring-0 text-sm font-medium"
          />
        </div>
      </div>
    </div>

    <!-- Buget & Suprafață Section -->
    <div class="space-y-4">
      <div class="flex items-center gap-2 mb-2 px-1">
        <i class="pi pi-sliders-h text-orange"></i>
        <span class="text-xs font-bold text-slate-800 uppercase tracking-widest">Detalii Financiare</span>
      </div>

      <div class="space-y-6">
        <div>
          <div class="flex items-center justify-between mb-3 px-1">
            <span class="text-[10px] font-bold text-slate-400 uppercase">Buget (€)</span>
            <span class="text-[10px] font-bold text-orange">{{ rangeValues[0] | number }} - {{ rangeValues[1] | number }}</span>
          </div>
          <div class="flex items-center gap-2 mb-4">
            <input
              type="text"
              [(ngModel)]="inputs.price.lo"
              name="priceLo"
              (focus)="$any($event.target).select()"
              (blur)="onInputChange('price', 'lo')"
              class="w-full h-9 bg-slate-50 rounded-lg px-2 text-[11px] text-center text-slate-700 border border-slate-100 focus:border-orange focus:bg-white transition-all font-bold"
            />
            <span class="text-slate-300 text-[10px]">—</span>
            <input
              type="text"
              [(ngModel)]="inputs.price.hi"
              name="priceHi"
              (focus)="$any($event.target).select()"
              (blur)="onInputChange('price', 'hi')"
              class="w-full h-9 bg-slate-50 rounded-lg px-2 text-[11px] text-center text-slate-700 border border-slate-100 focus:border-orange focus:bg-white transition-all font-bold"
            />
          </div>
          <p-slider
            [(ngModel)]="rangeValues"
            [range]="true"
            [min]="minPriceLimit"
            [max]="maxPriceLimit"
            [step]="1000"
            (onChange)="onPriceRangeChange()"
            name="priceSlider"
            class="w-full"
          />
        </div>

        <div>
          <div class="flex items-center justify-between mb-3 px-1">
            <span class="text-[10px] font-bold text-slate-400 uppercase">Suprafață (m²)</span>
            <span class="text-[10px] font-bold text-orange">{{ surfaceRangeValues[0] }} - {{ surfaceRangeValues[1] }}</span>
          </div>
          <div class="flex items-center gap-2 mb-4">
            <input
              type="text"
              [(ngModel)]="inputs.surface.lo"
              name="surfaceLo"
              (focus)="$any($event.target).select()"
              (blur)="onInputChange('surface', 'lo')"
              class="w-full h-9 bg-slate-50 rounded-lg px-2 text-[11px] text-center text-slate-700 border border-slate-100 focus:border-orange focus:bg-white transition-all font-bold"
            />
            <span class="text-slate-300 text-[10px]">—</span>
            <input
              type="text"
              [(ngModel)]="inputs.surface.hi"
              name="surfaceHi"
              (focus)="$any($event.target).select()"
              (blur)="onInputChange('surface', 'hi')"
              class="w-full h-9 bg-slate-50 rounded-lg px-2 text-[11px] text-center text-slate-700 border border-slate-100 focus:border-orange focus:bg-white transition-all font-bold"
            />
          </div>
          <p-slider
            [(ngModel)]="surfaceRangeValues"
            [range]="true"
            [min]="minSurfaceLimit"
            [max]="maxSurfaceLimit"
            [step]="1"
            (onChange)="onSurfaceRangeChange()"
            name="surfaceSlider"
            class="w-full"
          />
        </div>
      </div>
    </div>
  </div>

  <!-- Actions -->
  <div class="flex flex-col md:flex-row items-center gap-4 pt-6 border-t border-slate-50">
    <button
      type="submit"
      class="w-full md:w-auto px-10 h-14 bg-orange text-white rounded-2xl font-black text-base shadow-lg shadow-orange/20 hover:bg-orange-600 hover:-translate-y-0.5 active:scale-[0.98] transition-all flex items-center justify-center gap-3"
    >
      <i class="pi pi-search text-lg"></i>
      Explorează Proprietăți
    </button>

    @if (authService.isAuthenticated()) {
      <button
        type="button"
        (click)="onSaveClick()"
        class="w-full md:w-auto px-8 h-14 bg-slate-50 border border-slate-200 text-slate-700 rounded-2xl font-bold text-base hover:bg-white hover:border-orange/30 hover:text-orange transition-all flex items-center justify-center gap-2"
      >
        <i class="pi pi-bookmark"></i>
        Salvează Filtrele
      </button>
    }

    <div class="flex-grow"></div>
    
    <p class="text-[10px] text-slate-400 font-medium italic hidden md:block">
      <i class="pi pi-info-circle mr-1"></i>
      Folosește filtrele pentru o căutare precisă
    </p>
  </div>
</form>
