@if (totalPages > 1) {
  <div class="flex items-center justify-center space-x-2 my-8">
    <button
      (click)="onPageChange(currentPage - 1)"
      [disabled]="currentPage === 1"
      class="px-4 py-2 rounded-lg bg-white border border-gray-300 disabled:opacity-50 disabled:cursor-not-allowed hover:bg-gray-50 transition-colors"
    >
      Anterior
    </button>

    <div class="flex items-center space-x-1">
      @for (page of pages; track page) {
        <button
          (click)="onPageChange(page)"
          [class.bg-orange]="page === currentPage"
          [class.text-white]="page === currentPage"
          [class.border-orange]="page === currentPage"
          class="w-10 h-10 rounded-lg border border-gray-300 hover:bg-orange/10 transition-colors"
        >
          {{ page }}
        </button>
      }
    </div>

    <button
      (click)="onPageChange(currentPage + 1)"
      [disabled]="currentPage === totalPages"
      class="px-4 py-2 rounded-lg bg-white border border-gray-300 disabled:opacity-50 disabled:cursor-not-allowed hover:bg-gray-50 transition-colors"
    >
      Următor
    </button>
  </div>
}
